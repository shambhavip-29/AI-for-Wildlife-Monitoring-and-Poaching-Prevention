<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AI for Wildlife Monitoring and Poaching</title>
    <link href="/static/css/main.css" rel="stylesheet">

    <style>
        .content {
            max-width: 500px;
            margin: auto;
        }

        .bg-img {
            width: 100%;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.71), rgba(0, 0, 0, 0.7)), url('/static/images/poaching_new.png');
            background-size: cover;
            background-position: center;
        }

        .upload-section {
            text-align: center;
            margin-top: 40px;
        }

        .file-form-input {
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>
<nav>
    <ul class="footer-links">
        <li><a href="/user_home">Home</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="bg-img">
    <div class="content">
        <div class="index-main">
            <div style="width : 100%; padding-top : 5%;">
                <div class="header-content">
                    <h1 style="text-align: center;color: white">
                        <span class="header-content-text">Choose Video For Detection</span>
                    </h1>
                </div>
            </div>

            <div class="upload-section">
                <div class="upload-file">
                    <form class="file-form" action="/predict_video" method="POST" enctype="multipart/form-data">
                        <input class="file-form-input" type="file" name="video" accept="video/*" required><br>
                        <button type="submit" class="btn btn-info btn-lg mt-4">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
