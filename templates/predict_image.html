<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AI for Wildlife Monitoring and Poaching.
</title>
    <link href="/static/css/main.css" rel="stylesheet">

    <style>
        .content {
            max-width: 500px;
            margin: auto;

        .bg-img {
            width: 100%;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.71), rgba(0, 0, 0, 0.7)), url('static/images/poaching.png');
            background-size: cover;
            background-position: center;
        }
    </style>

</head>
<body>
<nav>
    <ul class="footer-links">

<div class="bg-img">

        <div class="index-main"><br><br><br><br>

            </div>
